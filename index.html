<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chunk Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #ffffff;
    --surface2: #f0ebe0;
    --ink: #1a1612;
    --ink2: #6b6358;
    --accent: #c84b2f;
    --accent2: #2f6bc8;
    --gold: #c8941a;
    --border: #ddd8cc;
    --success: #2a7a4b;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--ink);
    letter-spacing: 0.02em;
  }

  .logo em {
    font-style: italic;
    color: var(--accent);
  }

  .unit-badge {
    background: var(--ink);
    color: var(--bg);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 100px;
    text-transform: uppercase;
  }

  /* Nav tabs */
  .nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 0;
  }

  .nav-btn {
    padding: 12px 20px;
    border: none;
    background: transparent;
    color: var(--ink2);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .nav-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Main */
  main {
    flex: 1;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .progress-text {
    font-size: 0.75rem;
    color: var(--ink2);
    white-space: nowrap;
    font-weight: 500;
  }

  /* Practice card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .card-header {
    background: var(--ink);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-number {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .card-topic {
    font-size: 0.7rem;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .card-body {
    padding: 28px 24px;
  }

  .card-theme {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 12px;
  }

  .card-question {
    font-size: 0.9rem;
    color: var(--ink2);
    line-height: 1.6;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: 10px;
    border-left: 3px solid var(--accent);
  }

  .card-hint {
    margin-top: 16px;
    font-size: 0.75rem;
    color: var(--ink2);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    width: fit-content;
  }

  .card-hint svg {
    width: 14px; height: 14px;
    fill: var(--accent);
    transition: transform 0.2s;
  }

  /* Answer section */
  .answer-section {
    border-top: 1px solid var(--border);
    padding: 24px 24px 28px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .answer-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink2);
    margin-bottom: 8px;
  }

  .chunk-display {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--accent);
    line-height: 1.4;
    margin-bottom: 16px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  .example-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink2);
    margin-bottom: 8px;
  }

  .example-display {
    font-size: 1rem;
    color: var(--ink);
    line-height: 1.7;
    font-style: italic;
    font-family: 'DM Serif Display', serif;
  }

  .example-display em {
    color: var(--accent2);
    font-style: normal;
    font-family: 'DM Serif Display', serif;
  }

  /* Read count */
  .read-section {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeIn 0.3s ease;
  }

  .read-label {
    font-size: 0.8rem;
    color: var(--ink2);
  }

  .read-count {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--ink);
  }

  .read-target {
    font-size: 0.75rem;
    color: var(--ink2);
  }

  .btn-read {
    padding: 12px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-read:hover { background: #b03d23; transform: translateY(-1px); }
  .btn-read:active { transform: translateY(0); }

  .btn-read.done {
    background: var(--success);
  }

  /* Nav buttons */
  .nav-actions {
    display: flex;
    gap: 10px;
  }

  .btn-nav {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-nav:hover { background: var(--surface2); }

  .btn-nav.primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .btn-nav.primary:hover { background: #2d2820; }

  /* Test mode */
  .test-intro {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .test-intro h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    margin-bottom: 12px;
  }

  .test-intro p {
    color: var(--ink2);
    font-size: 0.9rem;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .test-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 28px;
  }

  .test-stat {
    text-align: center;
  }

  .test-stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--accent);
  }

  .test-stat-label {
    font-size: 0.75rem;
    color: var(--ink2);
  }

  .btn-start-test {
    padding: 14px 40px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .btn-start-test:hover { background: #b03d23; }

  /* Test card */
  .test-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .test-card-header {
    background: var(--accent2);
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .test-card-num {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.7);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .test-card-body {
    padding: 28px 24px;
  }

  .test-theme {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    margin-bottom: 12px;
  }

  .test-question {
    font-size: 0.9rem;
    color: var(--ink2);
    line-height: 1.6;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: 10px;
    border-left: 3px solid var(--accent2);
    margin-bottom: 20px;
  }

  .test-input-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .test-reveal-btn {
    padding: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.9rem;
    color: var(--ink2);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    text-align: center;
  }

  .test-reveal-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .test-answer-reveal {
    padding: 20px;
    background: var(--surface2);
    border-radius: 10px;
    animation: fadeIn 0.3s ease;
  }

  .test-chunk {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .test-example {
    font-size: 0.85rem;
    color: var(--ink2);
    font-style: italic;
    line-height: 1.6;
  }

  .test-judge {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .btn-correct {
    flex: 1;
    padding: 12px;
    background: var(--success);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-wrong {
    flex: 1;
    padding: 12px;
    background: var(--surface);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* Result */
  .result-screen {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 28px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    animation: fadeIn 0.4s ease;
  }

  .result-icon {
    font-size: 3rem;
    margin-bottom: 16px;
  }

  .result-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    margin-bottom: 8px;
  }

  .result-sub {
    color: var(--ink2);
    font-size: 0.9rem;
    margin-bottom: 28px;
  }

  .result-score {
    font-family: 'DM Serif Display', serif;
    font-size: 3.5rem;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .result-score-label {
    font-size: 0.85rem;
    color: var(--ink2);
    margin-bottom: 28px;
  }

  .result-pass {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .result-pass.pass { background: #d4f0e0; color: var(--success); }
  .result-pass.fail { background: #fde8e4; color: var(--accent); }

  .result-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">Chunk<em>Trainer</em></div>
  <div class="unit-badge" id="unit-badge">Unit 1</div>
</header>

<div class="nav">
  <button class="nav-btn active" id="tab-practice" onclick="switchTab('practice')">練習</button>
  <button class="nav-btn" id="tab-test" onclick="switchTab('test')">テスト</button>
</div>

<main id="main-content">
</main>

      { id:43, topic:'理由', theme:'〜のおかげでと言う時', question:'技術のおかげで便利になったと言いたい、どう言う？', chunk:'Thanks to...,...', example:'Thanks to technology, we can work from anywhere.' },
      { id:44, topic:'逆接', theme:'〜にもかかわらずと言う時', question:'忙しいにもかかわらず続けていると言いたい、どう言う？', chunk:'Despite...,...', example:'Despite being busy, I try to go fishing every month.' },
      { id:45, topic:'条件', theme:'条件を言う時', question:'もし〜ならと言いたい、どう言う？', chunk:'If...,...', example:'If I have time, I want to go fishing this weekend.' },
      { id:46, topic:'会話', theme:'許可を与える時', question:'いいよと言いたい、どう言う？', chunk:'Feel free to...', example:'Feel free to ask me any questions.' },
      { id:47, topic:'感情', theme:'驚きを表す時', question:'驚いたと言いたい、どう言う？', chunk:'I was surprised to...', example:'I was surprised to hear that news.' },
      { id:48, topic:'感情', theme:'心配を言う時', question:'心配していると言いたい、どう言う？', chunk:'I am worried about...', example:'I am worried about my child\'s future.' },
      { id:49, topic:'感情', theme:'喜びを言う時', question:'嬉しいと言いたい、どう言う？', chunk:'I am happy to...', example:'I am happy to spend time with my family.' },
      { id:50, topic:'経験', theme:'困難を乗り越えた時', question:'大変だったけど頑張ったと言いたい、どう言う？', chunk:'It was hard, but...', example:'It was hard, but I managed to finish the project.' },
    ]
  }
];

// =====================
// STATE
// =====================
const STORAGE_KEY = 'chunk_trainer_v2';
let state = {
  currentUnit: 0,
  practiceIndex: 0,
  readCounts: {}, // chunkId -> count
  testPassed: {},  // unitId -> bool
  tab: 'practice',
  // test state
  testMode: false, // 'intro' | 'running' | 'result'
  testQueue: [],
  testIndex: 0,
  testCorrect: 0,
  testRevealed: false,
};

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const saved = JSON.parse(s);
      state.readCounts = saved.readCounts || {};
      state.testPassed = saved.testPassed || {};
      state.currentUnit = saved.currentUnit || 0;
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      readCounts: state.readCounts,
      testPassed: state.testPassed,
      currentUnit: state.currentUnit,
    }));
  } catch(e) {}
}

// =====================
// RENDER
// =====================
const main = document.getElementById('main-content');

function switchTab(tab) {
  state.tab = tab;
  document.getElementById('tab-practice').classList.toggle('active', tab === 'practice');
  document.getElementById('tab-test').classList.toggle('active', tab === 'test');
  if (tab === 'practice') {
    state.practiceIndex = 0;
    renderPractice();
  } else {
    state.testMode = 'intro';
    renderTest();
  }
}

// ---- PRACTICE ----
function renderPractice() {
  const unit = UNITS[state.currentUnit];
  const chunk = unit.chunks[state.practiceIndex];
  const total = unit.chunks.length;
  const readCount = state.readCounts[chunk.id] || 0;
  const TARGET = 5;

  document.getElementById('unit-badge').textContent = unit.title;

  main.innerHTML = `
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${((state.practiceIndex+1)/total*100).toFixed(0)}%"></div></div>
      <div class="progress-text">${state.practiceIndex+1} / ${total}</div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-number">#${chunk.id}</div>
        <div class="card-topic">${chunk.topic}</div>
      </div>
      <div class="card-body">
        <div class="card-theme">${chunk.theme}</div>
        <div class="card-question">${chunk.question}</div>
        <div class="card-hint" onclick="revealAnswer()">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
          タップして答えを見る
        </div>
      </div>
      <div class="answer-section hidden" id="answer-section">
        <div class="answer-label">チャンク</div>
        <div class="chunk-display">${chunk.chunk}</div>
        <div class="divider"></div>
        <div class="example-label">例文</div>
        <div class="example-display">${chunk.example}</div>
      </div>
      <div class="read-section hidden" id="read-section">
        <div>
          <div class="read-label">音読回数</div>
          <div class="read-count" id="read-count">${readCount}</div>
          <div class="read-target">目標: ${TARGET}回</div>
        </div>
        <button class="btn-read ${readCount >= TARGET ? 'done' : ''}" id="btn-read" onclick="countRead()">
          ${readCount >= TARGET ? '✓ 完了' : '音読した'}
        </button>
      </div>
    </div>

    <div class="nav-actions">
      <button class="btn-nav" onclick="prevChunk()" ${state.practiceIndex === 0 ? 'disabled style="opacity:0.4"' : ''}>← 前へ</button>
      <button class="btn-nav primary" onclick="nextChunk()">${state.practiceIndex === total-1 ? 'テストへ →' : '次へ →'}</button>
    </div>
  `;
}

function revealAnswer() {
  document.getElementById('answer-section').classList.remove('hidden');
  document.getElementById('read-section').classList.remove('hidden');
  document.querySelector('.card-hint').classList.add('hidden');
}

function countRead() {
  const unit = UNITS[state.currentUnit];
  const chunk = unit.chunks[state.practiceIndex];
  const TARGET = 5;
  state.readCounts[chunk.id] = (state.readCounts[chunk.id] || 0) + 1;
  saveState();
  const count = state.readCounts[chunk.id];
  document.getElementById('read-count').textContent = count;
  if (count >= TARGET) {
    document.getElementById('btn-read').textContent = '✓ 完了';
    document.getElementById('btn-read').classList.add('done');
  }
}

function nextChunk() {
  const unit = UNITS[state.currentUnit];
  if (state.practiceIndex >= unit.chunks.length - 1) {
    switchTab('test');
  } else {
    state.practiceIndex++;
    renderPractice();
  }
}

function prevChunk() {
  if (state.practiceIndex > 0) {
    state.practiceIndex--;
    renderPractice();
  }
}

// ---- TEST ----
function renderTest() {
  if (state.testMode === 'intro') renderTestIntro();
  else if (state.testMode === 'running') renderTestCard();
  else if (state.testMode === 'result') renderTestResult();
}

function renderTestIntro() {
  const unit = UNITS[state.currentUnit];
  const passed = state.testPassed[unit.id];
  main.innerHTML = `
    <div class="test-intro">
      <h2>${unit.title} テスト</h2>
      <p>練習した50問から30問がランダムに出題されます。<br>全問正解で合格です。</p>
      <div class="test-stats">
        <div class="test-stat">
          <div class="test-stat-num">30</div>
          <div class="test-stat-label">出題数</div>
        </div>
        <div class="test-stat">
          <div class="test-stat-num">30</div>
          <div class="test-stat-label">合格ライン</div>
        </div>
      </div>
      ${passed ? '<div style="color:var(--success);font-weight:600;margin-bottom:16px;">✓ このユニットは合格済みです</div>' : ''}
      <button class="btn-start-test" onclick="startTest()">テスト開始</button>
    </div>
  `;
}

function startTest() {
  const unit = UNITS[state.currentUnit];
  // shuffle and pick 30
  const shuffled = [...unit.chunks].sort(() => Math.random() - 0.5);
  state.testQueue = shuffled.slice(0, 30);
  state.testIndex = 0;
  state.testCorrect = 0;
  state.testRevealed = false;
  state.testMode = 'running';
  renderTestCard();
}

function renderTestCard() {
  const chunk = state.testQueue[state.testIndex];
  const total = state.testQueue.length;
  main.innerHTML = `
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${((state.testIndex)/total*100).toFixed(0)}%;background:var(--accent2)"></div></div>
      <div class="progress-text">${state.testIndex+1} / ${total}</div>
    </div>
    <div class="test-card">
      <div class="test-card-header">
        <div class="test-card-num">問題 ${state.testIndex+1}</div>
        <div style="font-size:0.7rem;color:rgba(255,255,255,0.7);">正解: ${state.testCorrect}</div>
      </div>
      <div class="test-card-body">
        <div class="test-theme">${chunk.theme}</div>
        <div class="test-question">${chunk.question}</div>
        <div class="test-input-area">
          ${!state.testRevealed ? `
            <div style="font-size:0.8rem;color:var(--ink2);text-align:center;padding:12px;">声に出して言ってみてください</div>
            <button class="test-reveal-btn" onclick="revealTestAnswer()">答えを確認する</button>
          ` : `
            <div class="test-answer-reveal">
              <div class="test-chunk">${chunk.chunk}</div>
              <div class="test-example">${chunk.example}</div>
            </div>
            <div class="test-judge">
              <button class="btn-wrong" onclick="judgeTest(false)">✗ 言えなかった</button>
              <button class="btn-correct" onclick="judgeTest(true)">✓ 言えた</button>
            </div>
          `}
        </div>
      </div>
    </div>
  `;
}

function revealTestAnswer() {
  state.testRevealed = true;
  renderTestCard();
}

function judgeTest(correct) {
  if (correct) state.testCorrect++;
  state.testIndex++;
  state.testRevealed = false;
  if (state.testIndex >= state.testQueue.length) {
    state.testMode = 'result';
    renderTestResult();
  } else {
    renderTestCard();
  }
}

function renderTestResult() {
  const total = state.testQueue.length;
  const correct = state.testCorrect;
  const passed = correct === total;
  const unit = UNITS[state.currentUnit];
  if (passed) {
    state.testPassed[unit.id] = true;
    saveState();
  }
  main.innerHTML = `
    <div class="result-screen">
      <div class="result-icon">${passed ? '🎉' : '📚'}</div>
      <div class="result-title">${passed ? '合格！' : 'もう少し'}</div>
      <div class="result-sub">${passed ? 'Unit 1 クリアおめでとうございます' : '練習を続けて再挑戦しましょう'}</div>
      <div class="result-score">${correct} / ${total}</div>
      <div class="result-score-label">正解数</div>
      <div class="result-pass ${passed ? 'pass' : 'fail'}">${passed ? 'PASS' : 'TRY AGAIN'}</div>
      <div class="result-actions">
        ${!passed ? `<button class="btn-nav primary" onclick="startTest()">もう一度テスト</button>` : ''}
        <button class="btn-nav" onclick="backToPractice()">練習に戻る</button>
      </div>
    </div>
  `;
}

function backToPractice() {
  state.practiceIndex = 0;
  switchTab('practice');
}

// =====================
// INIT
// =====================
loadState();
renderPractice();
</script>
</body>
</html>
